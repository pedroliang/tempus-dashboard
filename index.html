<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPUS - Dashboard Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">TEMPUS</div>
        <nav>
            <a href="#" class="nav-link active" id="link-info-obra">INFO OBRA</a>
            <a href="#" class="nav-link" id="link-dash-graf">DASH GRAF</a>
            <a href="#" class="nav-link">GANTT CRON MED</a>
            <a href="#" class="nav-link">GANTT CRON DIN</a>
            <a href="#" class="nav-link">MED</a>
            <a href="#" class="nav-link">DES</a>
            <a href="#" class="nav-link">ANÁLISE</a>
            <a href="#" class="nav-link">DIN</a>
            <a href="#" class="nav-link">FIN</a>
            <a href="#" class="nav-link">DIF</a>
        </nav>
    </div>

    <main class="main-content">
        <div class="dashboard-header">
            <h1>Tempus Dashboard</h1>
        </div>

        <!-- ABA: INFO OBRA (Reconstruída com Design de Referência) -->
        <div id="view-info-obra" class="view-container" style="display: block;">
            <div class="dashboard-grid">
                
                <!-- Coluna Esquerda: Informações Principais -->
                <div class="left-column">
                    <div class="panel">
                        <h2 class="panel-header">Informações da Obra</h2>
                        <table class="data-table" id="info-obra-table">
                            <!-- Injetado via JS -->
                        </table>
                    </div>
                </div>

                <!-- Coluna Direita: Prazos, Financeiro e Status -->
                <div class="right-column">
                    <!-- Painel Prazos -->
                    <div class="panel">
                        <h2 class="panel-header">Prazos da Obra</h2>
                        <div class="schedule-cards" id="prazos-container">
                            <!-- Injetado via JS -->
                        </div>
                    </div>

                    <!-- Painel Termômetro Financeiro -->
                    <div class="panel">
                        <h2 class="panel-header">Termômetro Financeiro</h2>
                        <div id="termometro-container" class="thermometer-value">
                            <!-- Injetado via JS -->
                        </div>
                    </div>

                    <!-- Painel Serviços de Obra -->
                    <div class="panel">
                        <h2 class="panel-header">Serviços de Obra</h2>
                        <div class="donut-chart-container">
                            <div class="donut-wrapper">
                                <canvas id="donut-servicos"></canvas>
                            </div>
                            <div class="donut-legend" id="servicos-legend">
                                <!-- Injetado via JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Painel Caminho Crítico -->
                    <div class="panel">
                        <h2 class="panel-header">Caminho Crítico</h2>
                        <div class="linear-progress-container" id="caminho-critico-container">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ABA: DASH GRAF -->
        <div id="view-dash-graf" class="view-container">
            <div class="dashboard-grid dash-graf-grid">
                <!-- Gráfico Principal (Largo) -->
                <div class="panel graf-panel principal">
                    <div class="graf-header">
                        <h2>Análise de Desempenho</h2>
                        <select id="select-graf-principal" class="graf-select">
                            <option value="curva-s">Curva S (Progresso)</option>
                            <option value="curva-s-dia">Curva S Diária</option>
                            <option value="comparativo-mensal">Comparativo Mensal (Geral)</option>
                            <option value="comparativo-mensal-priv">Comparativo Mensal (Privada)</option>
                            <option value="comparativo-mensal-npriv">Comparativo Mensal (Não Privada)</option>
                        </select>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="chartPrincipal"></canvas>
                    </div>
                </div>

                <!-- Gráfico Secundário (Estreito/Distribuição) -->
                <div class="panel graf-panel secundario">
                    <div class="graf-header">
                        <h2>Distribuição</h2>
                        <select id="select-graf-secundario" class="graf-select">
                            <option value="histograma">Histograma de Recursos</option>
                            <option value="histograma-acumulado">Histograma Acumulado</option>
                            <option value="receita-saldo">Receita e Saldo</option>
                            <option value="distribuicao-recursos">Dist. de Recursos</option>
                        </select>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="chartSecundario"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
